<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JSON Data Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2024;
    --border: #2a2d33;
    --border2: #363a42;
    --text: #e8eaf0;
    --muted: #7a7f8c;
    --accent: #4f9cf9;
    --accent-dim: #1a3558;
    --green: #3ecf8e;
    --green-dim: #0f3626;
    --amber: #f59e0b;
    --amber-dim: #3a2800;
    --red: #f87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #sidebar-top {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo-text { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: var(--mono); }

  #server-status {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font-size: 12px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .dot.red { background: var(--red); }
  #status-text { color: var(--muted); flex: 1; }
  #refresh-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 0 2px; line-height: 1;
  }
  #refresh-btn:hover { color: var(--accent); }

  #source-list { flex: 1; overflow-y: auto; padding: 10px 8px; }
  #source-list::-webkit-scrollbar { width: 4px; }
  #source-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .source-item {
    padding: 9px 10px; border-radius: 6px;
    border: 1px solid transparent; margin-bottom: 3px;
    cursor: default;
  }
  .source-item:hover { background: var(--bg3); border-color: var(--border); }
  .source-name { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); margin-bottom: 3px; }
  .source-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
  .source-badge {
    font-size: 10px; font-family: var(--mono);
    background: var(--green-dim); color: var(--green);
    padding: 1px 6px; border-radius: 3px; white-space: nowrap;
  }

  #sidebar-footer {
    padding: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted); line-height: 1.6;
  }
  #sidebar-footer code { font-family: var(--mono); color: var(--accent); font-size: 11px; }
  #last-sync { margin-top: 6px; font-family: var(--mono); font-size: 10px; color: var(--border2); }
  #countdown { color: var(--amber); }

  /* ── Main chat ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #chat-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2);
  }
  #chat-header h1 { font-size: 14px; font-weight: 600; flex: 1; }
  #header-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px; display: flex; flex-direction: column; gap: 16px;
    background: var(--bg);
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-row { display: flex; gap: 10px; max-width: 820px; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.assistant { align-self: flex-start; }
  .msg-row.system { align-self: center; }

  .avatar {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; font-family: var(--mono);
    margin-top: 2px;
  }
  .avatar.user { background: var(--accent-dim); color: var(--accent); }
  .avatar.assistant { background: var(--green-dim); color: var(--green); }

  .bubble {
    padding: 10px 14px; border-radius: 8px;
    font-size: 13.5px; line-height: 1.65;
    border: 1px solid var(--border);
  }
  .msg-row.user .bubble { background: var(--bg3); border-color: var(--border2); }
  .msg-row.assistant .bubble { background: var(--bg2); }

  .bubble pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 10px 12px; margin: 8px 0;
    font-family: var(--mono); font-size: 12px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  }
  .bubble code { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .bubble strong { color: var(--text); font-weight: 600; }

  .sys-msg {
    font-size: 11px; font-family: var(--mono); color: var(--muted);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 5px 12px; text-align: center;
  }
  .sys-msg.ok { color: var(--green); border-color: var(--green-dim); background: var(--green-dim); }
  .sys-msg.warn { color: var(--amber); border-color: var(--amber-dim); background: var(--amber-dim); }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── Input ── */
  #input-area {
    padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--bg2); display: flex; gap: 10px; align-items: flex-end;
  }
  #user-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 14px;
    color: var(--text); font-family: var(--sans); font-size: 13.5px;
    resize: none; min-height: 42px; max-height: 120px; outline: none;
    transition: border-color 0.15s;
    field-sizing: content;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    height: 42px; padding: 0 18px; background: var(--accent);
    border: none; border-radius: 8px; color: white;
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #no-server {
    padding: 32px 20px; text-align: center; max-width: 480px; margin: auto;
  }
  #no-server h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  #no-server p { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 8px; }
  #no-server code { font-family: var(--mono); font-size: 12px; background: var(--bg3); padding: 10px 16px; border-radius: 6px; display: block; text-align: left; margin: 8px 0; color: var(--accent); border: 1px solid var(--border); }
  #retry-btn {
    margin-top: 12px; padding: 8px 20px; background: var(--accent);
    border: none; border-radius: 6px; color: white; font-size: 13px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 16 16"><path d="M2 3h12v2H2zm0 4h8v2H2zm0 4h10v2H2z"/></svg>
        </div>
        <div>
          <div class="logo-text">Data Agent</div>
          <div class="logo-sub">JSON folder watcher</div>
        </div>
      </div>
      <div id="server-status">
        <div class="dot amber" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
        <button id="refresh-btn" title="Refresh now" onclick="fetchSources(true)">↻</button>
      </div>
    </div>
    <div id="source-list"><div style="padding:12px;color:var(--muted);font-size:12px;">Loading sources…</div></div>
    <div id="sidebar-footer">
      Drop <code>.json</code> files into your watched folder — they'll appear here automatically.
      <div id="last-sync">Next sync in <span id="countdown">—</span></div>
    </div>
  </div>

  <div id="main">
    <div id="chat-header">
      <h1>AI Data Agent</h1>
      <span id="header-meta">—</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Ask anything about your JSON data…" rows="1"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
// Auto-detect: use Railway URL in production, localhost in development
const SERVER = (
  window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:3456"
    : window.RAILWAY_SERVER_URL || "carbonagent-production.up.railway.app"
);
const REFRESH_INTERVAL = 2 * 60 * 1000;
const CHAT_API = `${SERVER}/chat`;

let sources = [];
let messages = [];
let isLoading = false;
let nextRefresh = Date.now() + REFRESH_INTERVAL;
let serverOnline = false;
let currentWatchDir = "";

// ── DOM refs ──────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const sourceListEl = document.getElementById("source-list");
const statusDot = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");
const headerMeta = document.getElementById("header-meta");
const countdown = document.getElementById("countdown");

// ── Server polling ─────────────────────────────────────────────────────────────
async function fetchSources(manual = false) {
  try {
    const res = await fetch(`${SERVER}/sources`, { signal: AbortSignal.timeout(4000) });
    const json = await res.json();
    const prev = sources.map(s => s.name).join(",");
    sources = json.sources || [];
    currentWatchDir = json.watchDir || "";
    const curr = sources.map(s => s.name).join(",");
    if (!serverOnline) {
      serverOnline = true;
      setStatus("green", `Connected · ${WATCH_DIR_LABEL(json.watchDir)}`);
      sendBtn.disabled = false;
      addSysMsg(`Server connected. Watching: ${json.watchDir}`, "ok");
      if (!messages.length) addWelcome();
    }
    if (manual || prev !== curr) renderSources();
    else renderSources();
    updateHeader();
    nextRefresh = Date.now() + REFRESH_INTERVAL;
  } catch (e) {
    serverOnline = false;
    setStatus("red", "Server offline");
    sendBtn.disabled = true;
    renderOffline();
  }
}

function WATCH_DIR_LABEL(dir) {
  if (!dir) return "…";
  const parts = dir.replace(/\\/g, "/").split("/");
  return parts.slice(-2).join("/");
}

function setStatus(color, text) {
  statusDot.className = "dot " + color;
  statusText.textContent = text;
}

function renderSources() {
  if (!sources.length) {
    sourceListEl.innerHTML = `<div style="padding:14px 12px;color:var(--muted);font-size:12px;line-height:1.6;">No JSON files found.<br>Drop files into your watched folder.</div>`;
    return;
  }
  sourceListEl.innerHTML = sources.map(s => {
    const age = s.updatedAt ? timeAgo(s.updatedAt) : "—";
    const records = s.records != null ? `${s.records} rows` : "object";
    return `<div class="source-item">
      <div class="source-name">${s.name}.json</div>
      <div class="source-meta">
        <span class="source-badge">${records}</span>
        <span>${age}</span>
      </div>
    </div>`;
  }).join("");
}

function renderOffline() {
  sourceListEl.innerHTML = `<div style="padding:14px 12px;color:var(--red);font-size:12px;line-height:1.7;">
    Cannot reach server.<br>
    <span style="color:var(--muted)">Run: <code style="color:var(--accent);font-family:monospace">node server.js</code></span>
  </div>`;
}

function updateHeader() {
  const total = sources.reduce((a, s) => a + (s.records || 0), 0);
  headerMeta.textContent = sources.length
    ? `${sources.length} source${sources.length > 1 ? "s" : ""} · ${total} records`
    : "no data loaded";
}

function timeAgo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 10) return "just now";
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.round(s / 60)}m ago`;
  return `${Math.round(s / 3600)}h ago`;
}

// ── Countdown timer ───────────────────────────────────────────────────────────
setInterval(() => {
  const secs = Math.max(0, Math.round((nextRefresh - Date.now()) / 1000));
  countdown.textContent = secs > 0 ? `${secs}s` : "syncing…";
  if (secs === 0) fetchSources();
}, 1000);

// ── Chat ───────────────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  // Flatten all articles across all sources, sort by date descending (latest first)
  const allArticles = sources.flatMap(s => Array.isArray(s.data) ? s.data : [s.data]);
  allArticles.sort((a, b) => {
    const da = a.date ? new Date(a.date) : new Date(0);
    const db = b.date ? new Date(b.date) : new Date(0);
    return db - da;
  });
  const ctx = JSON.stringify(allArticles, null, 2);
  const total = allArticles.length;
  const latest = allArticles[0]?.date ? new Date(allArticles[0].date).toDateString() : "unknown";
  const oldest = allArticles[total-1]?.date ? new Date(allArticles[total-1].date).toDateString() : "unknown";

  return `You are an intelligent news and market intelligence assistant powered by Llama 3.3 70B (via Groq).

You have access to ${total} news articles/items, sorted from latest to oldest (date range: ${latest} → ${oldest}).

BEHAVIOR RULES:
- Always prioritize the most recent articles when answering questions unless the user asks for older news.
- When listing articles, always show them in reverse chronological order (newest first).
- For each article you reference, always mention: title, date, and key insight.
- When asked for "latest news" or "recent updates", show the top 5 most recent articles.
- Group results by market_categories or other_labels when relevant.
- If asked about a topic (e.g. "hydrogen", "solar"), filter articles by matching title, content, market_categories, or other_labels.
- Summarize content clearly — do not dump raw JSON. Write in clean readable sentences.
- If asked which model you are, say "Llama 3.3 70B running on Groq".
- Format dates as human-readable (e.g. "Feb 17, 2026") not ISO strings.
- If an article has a post_link, include it when referencing that article.

ARTICLE DATA (sorted latest first):
\`\`\`json
${ctx}
\`\`\``;
}

function addWelcome() {
  const allArticles = sources.flatMap(s => Array.isArray(s.data) ? s.data : [s.data]);
  allArticles.sort((a, b) => new Date(b.date||0) - new Date(a.date||0));
  const total = allArticles.length;
  const cats = [...new Set(allArticles.flatMap(a => a.market_categories||[]))];
  const latest = allArticles[0];
  const folder = currentWatchDir ? `<br><br>📁 Drop <code>.json</code> files into: <code style="word-break:break-all">${currentWatchDir}</code>` : "";
  const latestSnippet = latest ? `<br><br>🗞️ Latest article: <strong>${latest.title}</strong> <span style="color:var(--muted);font-size:12px">(${latest.date ? new Date(latest.date).toDateString() : "no date"})</span>` : "";
  const catsSnippet = cats.length ? `<br>📂 Categories: ${cats.map(c=>`<code>${c}</code>`).join(", ")}` : "";
  appendMsg("assistant", `Hello! I'm your market intelligence assistant (Llama 3.3 70B on Groq).<br>I have <strong>${total}</strong> article${total!==1?"s":""} loaded, sorted latest first.${latestSnippet}${catsSnippet}${folder}<br><br>Try asking:<br>• "What are the latest news articles?"<br>• "Summarize news about hydrogen"<br>• "Show all articles from February 2026"<br>• "What are the top stories in Sustainable Fuels?"<br>• "Find articles mentioning India"`);
}

function addSysMsg(text, type = "") {
  const d = document.createElement("div");
  d.className = `sys-msg ${type}`;
  d.textContent = text;
  messagesEl.appendChild(d);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendMsg(role, html) {
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;
  if (role === "user" || role === "assistant") {
    const av = document.createElement("div");
    av.className = `avatar ${role}`;
    av.textContent = role === "user" ? "you" : "ai";
    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = html;
    row.appendChild(av);
    row.appendChild(bub);
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

function formatReply(text) {
  return text
    .replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre>${escHtml(code.trim())}</pre>`)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text || isLoading || !serverOnline) return;
  inputEl.value = "";
  inputEl.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  messages.push({ role: "user", content: text });
  appendMsg("user", escHtml(text));

  // Typing indicator
  const typingRow = document.createElement("div");
  typingRow.className = "msg-row assistant";
  typingRow.innerHTML = `<div class="avatar assistant">ai</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(typingRow);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  // Refresh sources before answering so data is fresh
  await fetchSources();

  try {
    const res = await fetch(CHAT_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content.map(c => c.type === "text" ? c.text : "").join("");
    messages.push({ role: "assistant", content: reply });
    typingRow.remove();
    appendMsg("assistant", formatReply(reply));
  } catch (e) {
    typingRow.remove();
    appendMsg("assistant", `<span style="color:var(--red)">Error: ${escHtml(e.message)}</span>`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Input handlers ─────────────────────────────────────────────────────────────
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── Boot ───────────────────────────────────────────────────────────────────────
fetchSources();
setInterval(() => fetchSources(), REFRESH_INTERVAL);
</script>
</body>
</html>
